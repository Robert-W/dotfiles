add_newline = false
command_timeout = 3000
format = "${directory}${git_branch}${git_status}${aws}${kubernetes}${line_break}${character}"

[aws]
format = '(aws [$profile \[[$duration](bright-purple)\]]($style))'
style = 'bold bright-purple'

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[git_branch]
format = 'on [$branch]($style) '
style = 'bold #ff70cd'

[git_status]
style = 'bold yellow'

[kubernetes]
disabled = false
style = 'bold #70ffa4'
format = 'k8s [$context( \($namespace\))]($style)'
