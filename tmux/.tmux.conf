set -g default-terminal 'xterm-256color'
set -ga terminal-overrides ',xterm-256color*:Tc'
set -s escape-time 0

# Set the base-index tmux uses for session counts
set -g base-index 1

# Reload tmux config
bind r source-file ~/.tmux.conf

# Easier to use for creating vertical windows
# Also, have them default to CWD
bind v split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Statusbar configurations
set -g status-interval 1
set -g status-justify absolute-centre
set -g status-position top

## Session name left side of status bar
set -g status-left-length 60
set -g status-left '#[fg=#1e1e2e,bg=#3bcbde,bold] #S #[fg=#3bcbde,bg=#1e1e2e]'

## Details about Pane, time, date, etc in right side of status bar
set -g status-right-length 100
set -g  status-right '#[fg=#cdd6f4,bg=#45475a]  #{client_termtype} '
set -ag status-right '#[fg=#1e1e2e,bg=#89b4fa,bold]  Pane:#P '
set -ag status-right '#[fg=#cdd6f4,bg=#585b70,bold]  PID:#{pid} '
set -ag status-right '#[fg=#1e1e2e,bg=#3bcbde,bold]  %H:%M:%S %d-%b-%y '

## Specific styles on the status bar
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

## Padding to make the tabs more visually pleasing
set -g window-status-format ' #I #W#{s/[-*]//:window_flag} '
set -g window-status-current-format '#[fg=#1e1e2e,bg=#3bcbde,bold] #I #W#{s/[-*]//:window_flag} #[fg=#3bcbde,bg=#1e1e2e]'
set -g window-status-style          'fg=#6c7086'
set -g window-status-current-style  'fg=#1e1e2e,bg=#3bcbde,bold'
set -g window-status-separator      ' '

# Style the panes/borders
set -g pane-border-style        'fg=#45475a'
set -g pane-active-border-style 'fg=#3bcbde'
set -g pane-border-lines heavy

# Messages / Command Prompt / Copy-Mode Selection
set -g message-style         'fg=#1e1e2e,bg=#e78284,bold'
set -g message-command-style 'fg=#1e1e2e,bg=#e78284,bold'
set -g mode-style            'fg=#1e1e2e,bg=#e78284,bold'
set -g clock-mode-colour     '#3bcbde'

# Display Panes command styling (prefix + q)
set -g display-panes-active-colour '#3bcbde'
set -g display-panes-colour        '#45475a'
set -g display-panes-time          2000

# Vim style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Setup bindings to run some local scripts
bind -r -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Easy way to resize windows, may add keyboard methods later
set -g mouse on